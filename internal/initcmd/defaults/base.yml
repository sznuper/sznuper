alerts:
  - name: sznuper_lifecycle
    healthcheck: builtin://lifecycle
    trigger:
      lifecycle: true
    template: |-
      [{{event.type | upper}}] {{globals.hostname}}: sznuper {{event.type}}

  - name: disk_usage
    healthcheck: https://github.com/sznuper/healthchecks/releases/download/v0.12.0/disk_usage
    sha256: 59ed70a9e09ae6e0db28355c877a579c32fafda7c7baab66b21a652cefb33f51
    trigger:
      interval: 30s
    args:
      threshold_warn_percent: 80
      threshold_crit_percent: 95
      mount: /
    cooldown: 10m
    template: |-
      [{{event.type | upper}}] {{globals.hostname}}:
      Disk {{args.mount}} at {{event.usage_percent}}% ({{event.available}} remaining)
    events:
      healthy: [ok]

  - name: memory_usage
    healthcheck: https://github.com/sznuper/healthchecks/releases/download/v0.12.0/memory_usage
    sha256: 3ecdb04780b3d43a78dbe1fb28d1a1526fd831c1ce93f86953e2e0708259eb6c
    trigger:
      interval: 30s
    args:
      threshold_warn_percent: 80
      threshold_crit_percent: 95
    cooldown: 10m
    template: |-
      [{{event.type | upper}}] {{globals.hostname}}:
      Memory at {{event.usage_percent}}% ({{event.available}} remaining)
    events:
      healthy: [ok]

  - name: cpu_usage
    healthcheck: https://github.com/sznuper/healthchecks/releases/download/v0.12.0/cpu_usage
    sha256: 8b9e4b2b4aa0e1cd3227ab20ede98a42e1442f77ac36c6d41fc12e691e8eddf5
    trigger:
      interval: 30s
    args:
      threshold_warn_percent: 80
      threshold_crit_percent: 95
    cooldown: 10m
    template: |-
      [{{event.type | upper}}] {{globals.hostname}}:
      CPU at {{event.usage_percent}}%
    events:
      healthy: [ok]
