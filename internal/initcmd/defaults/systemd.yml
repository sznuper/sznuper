alerts:
  - name: ssh_journal
    healthcheck: https://github.com/sznuper/healthchecks/releases/download/v0.9.0/ssh_journal
    sha256: 584deeb1b474b243b6ad6d40fd54735179592f9a57ad6675a6b82ace18e7e52f
    trigger:
      pipe: journalctl -f --since=now -u ssh -u sshd --output=json --output-fields=MESSAGE,__REALTIME_TIMESTAMP --no-pager
    cooldown: 5m
    template: |-
      SSH {{event.type}} from {{event.host}} as {{event.user}}
    notify:
      - logger
    events:
      on_unmatched: drop
      override:
        failure:
          cooldown: 1m
        login: {}
