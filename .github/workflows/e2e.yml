name: E2E

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build sznuper
        run: go build -o sznuper ./cmd/sznuper

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install test dependencies
        working-directory: e2e
        run: npm ci

      - name: Run E2E tests
        working-directory: e2e
        run: npm test
        env:
          SZNUPER_BIN: ${{ github.workspace }}/sznuper
