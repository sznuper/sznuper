name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  e2e:
    needs: ci
    uses: ./.github/workflows/e2e.yml

  release:
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e-install:
    needs: release
    uses: ./.github/workflows/e2e-install.yml
    with:
      tag: ${{ github.ref_name }}
    secrets:
      HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
      HETZNER_SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
      HETZNER_SSH_KEY_NAME: ${{ secrets.HETZNER_SSH_KEY_NAME }}

  notify-dist:
    needs: e2e-install
    runs-on: ubuntu-latest
    steps:
      - name: Trigger dist E2E
        env:
          GH_TOKEN: ${{ secrets.SZNUPER_RELEASE_DISPATCH }}
        run: |
          gh api repos/sznuper/dist/dispatches \
            -f event_type=sznuper-release \
            -f 'client_payload[tag]=${{ github.ref_name }}'
